name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # of je productiebranch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nodig voor deploy-pages
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # of de versie die jij gebruikt

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './dist' # Voor Vite is de output standaard 'dist', voor statische HTML is dit vaak de root of een andere map

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
